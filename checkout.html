<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - TrendWave</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://i.postimg.cc/R07Wy2gJ/favicon.png" type="image/x-icon">
    <style>
        .checkout-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .checkout-main {
            flex: 2;
            min-width: 300px;
        }

        .checkout-sidebar {
            flex: 1;
            min-width: 300px;
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 25px;
            position: sticky;
            top: 20px;
        }

        .checkout-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #111;
        }

        .section-title {
            font-size: 18px;
            font-weight: 500;
            margin: 30px 0 15px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .checkout-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            background: #fff;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }

        .checkout-input:focus {
            border-color: #333;
        }

        .payment-box {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #f0f0f0;
        }

        .pay-btn {
            width: 100%;
            background: #000;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            padding: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.2s;
        }

        .pay-btn:hover {
            background: #222;
        }

        .order-summary-item {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }

        .order-summary-img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #eee;
        }

        .order-summary-info {
            flex: 1;
        }

        .order-summary-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 5px;
        }

        .order-summary-price {
            font-size: 14px;
            color: #666;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #555;
        }

        .summary-total {
            font-size: 18px;
            font-weight: 700;
            color: #111;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }

        @media (max-width: 768px) {
            .checkout-container {
                flex-direction: column;
            }
            .checkout-sidebar {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-main" style="border-bottom: 1px solid #eee;">
            <div class="container" style="text-align: center; padding: 15px 0;">
                <a href="index.html" class="header-logo"><img src="https://i.postimg.cc/XYYNC3X8/logo.png" alt="logo" width="120" height="36"></a>
            </div>
        </div>
    </header>

    <main>
        <div class="checkout-container">
            <div class="checkout-main">
                <h1 class="checkout-title">Checkout</h1>
                
                <form id="checkout-form">
                    <h2 class="section-title" style="margin-top:0;">Contact Information</h2>
                    <div class="form-group">
                        <input type="email" id="email" class="checkout-input" placeholder="Email Address" required>
                    </div>

                    <h2 class="section-title">Shipping Address</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="fname" class="checkout-input" placeholder="First Name" required>
                        </div>
                        <div class="form-group">
                            <input type="text" id="lname" class="checkout-input" placeholder="Last Name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <input type="text" id="address" class="checkout-input" placeholder="Address" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="apartment" class="checkout-input" placeholder="Apartment, suite, etc. (optional)">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="city" class="checkout-input" placeholder="City" required>
                        </div>
                        <div class="form-group">
                            <input type="text" id="zip" class="checkout-input" placeholder="Postal Code" required>
                        </div>
                    </div>

                    <h2 class="section-title">Payment Method</h2>
                    <div class="payment-box">
                        <div class="form-group">
                            <input type="text" id="card" class="checkout-input" placeholder="Card Number" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <input type="text" id="exp" class="checkout-input" placeholder="MM / YY" required>
                            </div>
                            <div class="form-group">
                                <input type="text" id="cvc" class="checkout-input" placeholder="CVC" required>
                            </div>
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <input type="text" id="cardname" class="checkout-input" placeholder="Name on Card" required>
                        </div>
                    </div>

                    <button type="submit" class="pay-btn" id="pay-btn">PAY $0.00</button>
                </form>
            </div>

            <div class="checkout-sidebar">
                <h3 style="font-size: 18px; margin-bottom: 20px;">Order Summary</h3>
                <div id="checkout-items" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;">
                    <!-- Cart items will be loaded here -->
                </div>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summary-subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span id="summary-total">$0.00</span>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script src="shared.js"></script>
    <script src="checkout.js"></script>
</body>

</html>
